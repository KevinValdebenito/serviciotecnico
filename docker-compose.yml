services:

  db-empleado:
    image: postgres:15-alpine
    container_name: postgres-empleado
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: employee_db
    volumes:
      - empleado_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-ticket:
    image: postgres:15-alpine
    container_name: postgres-ticket
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ticket
    volumes:
      - ticket_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-cliente:
    image: postgres:15-alpine
    container_name: postgres-cliente
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: cliente_db
    volumes:
      - cliente_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  db-auth:
    image: postgres:15-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: auth_db
    volumes:
      - auth_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  app-empleado:
    build: ./empleado
    container_name: api-empleado
    ports:
      - "8081:8081"
    environment:
      - DB_URL=jdbc:postgresql://db-empleado:5432/employee_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - APITICKET_URL=http://app-ticket:8082/api
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db-empleado:
        condition: service_healthy
      app-ticket:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/v3/api-docs"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app-ticket:
    build: ./ticket
    container_name: api-ticket
    ports:
      - "8082:8082"
    environment:
      - DB_URL=jdbc:postgresql://db-ticket:5432/ticket
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db-ticket:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/v3/api-docs"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app-cliente:
    build: ./cliente
    container_name: api-cliente
    ports:
      - "8083:8083"
    environment:
      - DB_URL=jdbc:postgresql://db-cliente:5432/cliente_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db-cliente:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8083/v3/api-docs"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app-auth:
    build: ./auth
    container_name: api-auth
    ports:
      - "7778:7778"
    environment:
      - DB_URL=jdbc:postgresql://db-auth:5432/auth_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      db-auth:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:7778/v3/api-docs"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app-bff:
    build: ./bff
    container_name: api-bff
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_URL=http://app-auth:7778
      - TECNICO_SERVICE_URL=http://app-empleado:8081
      - TICKET_SERVICE_URL=http://app-ticket:8082
      - CLIENTE_SERVICE_URL=http://app-cliente:8083
      - JWT_SECRET=${JWT_SECRET}
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY=DEBUG
    depends_on:
      - app-auth
      - app-empleado
      - app-ticket
      - app-cliente

  db-cotizacion:
    image: postgres:15-alpine
    container_name: postgres-cotizacion
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: cotizacion_db
    ports:
      - "5437:5432"

  app-cotizacion:
    build: ./cotizacion
    container_name: api-cotizacion
    ports:
      - "8088:8088"
    environment:
      - DB_URL=jdbc:postgresql://db-cotizacion:5432/cotizacion_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=root
      - TICKET_SERVICE_URL=http://app-ticket:8082
    depends_on:
      - db-cotizacion
      - app-ticket