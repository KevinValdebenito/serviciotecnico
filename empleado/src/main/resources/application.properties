spring.application.name=empleado
server.port=8081

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5436/employee_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

logging.level.root=DEBUG
logging.level.org.springframework=DEBUG
logging.level.com.serviciotecnico.empleado=DEBUG

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
jwt.expiration=${JWT_EXPIRATION:3600000}

apiTicket.url=${APITICKET_URL:http://localhost:8082/api}
