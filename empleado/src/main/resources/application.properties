spring.application.name=empleado
server.port=8081

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5434/employee_db}$

spring.datasource.username=${DB_USERNAME:employee}
spring.datasource.password=${DB_PASSWORD:employee}
spring.datasource.driver-class-name=org.postgresql.Driver

logging.level.root=DEBUG
logging.level.org.springframework=DEBUG
logging.level.com.example.empleado=DEBUG

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
jwt.expiration=${JWT_EXPIRATION:3600000}

apiTicket.url=http://localhost:8082/api