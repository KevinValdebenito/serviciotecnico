spring.application.name=cotizacion
server.port=8088

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5440/cotizacion_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

ticket.service.url=${TICKET_SERVICE_URL:http://localhost:8082}
repuesto.service.url=${REPUESTO_SERVICE_URL:http://localhost:8085}

management.endpoints.web.exposure.include=health,info

logging.level.root=INFO
logging.level.com.serviciotecnico.cotizacion=INFO

jwt.secret=${JWT_SECRET:dev-only-secret-change-me}